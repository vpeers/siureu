<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigaLinux</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0056a0; /* Dark blue background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .container {
            background-color: #ff9913; /* Bright orange center panel */
            width: 500px;
            padding: 40px;
            text-align: left;
            border: 2px solid #000;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            font-size: 70px;
            margin-top: 0;
            margin-bottom: 20px;
            color: #0056a0;
        }

        .image-placeholder {
            display: block;
            margin: 0 auto 30px auto;
            width: 200px;
            height: 200px;
            background-color: #333; /* Fallback color */
            border: 1px solid #000;
        }

        .image-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        p, ul {
            font-size: 18px;
            line-height: 1.6;
            color: #000;
        }

        ul {
            list-style-type: disc;
            margin-left: 20px;
        }

        .footer-text {
            margin-top: 30px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Haha</h1>
    
    <div class="image-placeholder">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/af/Tux.png" alt="Tux Linux Mascot">
    </div>

    <p>Padłeś ofiarą wirusa GigaLinux</p>

    <ul>
        <li>bardzo szybki</li>
        <li>wydajny</li>
        <li>kreatywny</li>
    </ul>

    <p class="footer-text">
        aby odzyskać dane wyjdź na klatke zesraj sie na schody i wyślij zdjęcie na e-mail javascriptjs@op.pl
    </p>
</div>

</body>
</html>
